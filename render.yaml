services:
  - type: web
    name: zscn-monitor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers=1 --timeout=600 --keep-alive=5
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TRADINGVIEW_WEBHOOK_SECRET
        sync: false
